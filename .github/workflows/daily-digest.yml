name: Daily AI Digest

on:
  # 每天早上 8 点（北京时间）自动运行
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  # 手动触发
  workflow_dispatch:

# 允许 Action 把生成的日报 push 回仓库
permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate digest
        run: node scripts/fetch-ai-digest.mjs

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet docs/digest/ 2>/dev/null && git diff --quiet --cached docs/digest/ 2>/dev/null && [ -z "$(git ls-files --others --exclude-standard docs/digest/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/digest/
          git commit -m "chore: update daily AI digest $(date +%Y-%m-%d)"
          git push
