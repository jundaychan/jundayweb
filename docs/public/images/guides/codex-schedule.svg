<svg viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="cs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d97757"/><stop offset="1" stop-color="#c96442"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="180" fill="#f5f4ed"/>
  <text x="450" y="26" fill="#5e5d59" font-size="14" font-weight="600" text-anchor="middle">Codex 定时任务：让它按点自动干活</text>

  <rect x="30"  y="48" width="232" height="80" rx="13" fill="url(#cs)"/>
  <text x="146" y="84" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">① 设定时间</text>
  <text x="146" y="108" fill="#f7e9e2" font-size="12.5" text-anchor="middle">每天 08:00 / 每周一</text>

  <rect x="334" y="48" width="232" height="80" rx="13" fill="url(#cs)"/>
  <text x="450" y="84" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">② 自动执行</text>
  <text x="450" y="108" fill="#f7e9e2" font-size="12.5" text-anchor="middle">到点 Codex 自己跑</text>

  <rect x="638" y="48" width="232" height="80" rx="13" fill="#141413"/>
  <text x="754" y="84" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">③ 产出结果</text>
  <text x="754" y="108" fill="#cfc9bd" font-size="12.5" text-anchor="middle">报表 / 数据自动好</text>

  <g fill="#c96442">
    <path d="M270 84 l24 0 l0 -6 l12 9 l-12 9 l0 -6 l-24 0 z"/>
    <path d="M574 84 l24 0 l0 -6 l12 9 l-12 9 l0 -6 l-24 0 z"/>
  </g>
  <path d="M754 132 C754 162 146 162 146 134" fill="none" stroke="#d9b8a8" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="450" y="160" fill="#a98c7c" font-size="12" text-anchor="middle">每天 / 每周自动重复，不用你盯着</text>
