      <stop offset="0" stop-color="#d97757"/><stop offset="1" stop-color="#c96442"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1000" height="158" fill="#f5f4ed"/>
  <g>
    <!-- 5 steps -->
