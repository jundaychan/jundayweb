<svg viewBox="0 0 620 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <radialGradient id="hub" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#e0875f"/><stop offset="1" stop-color="#b3512f"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="620" height="340" fill="#f5f4ed"/>
  <text x="310" y="26" fill="#5e5d59" font-size="14" font-weight="600" text-anchor="middle">WorkBuddy：接入你天天用的工具，手机就能遥控电脑</text>

  <!-- connector lines -->
  <g stroke="#d9b8a8" stroke-width="2.5">
    <line x1="310" y1="185" x2="310" y2="78"/>
    <line x1="310" y1="185" x2="500" y2="120"/>
    <line x1="310" y1="185" x2="470" y2="285"/>
    <line x1="310" y1="185" x2="150" y2="285"/>
    <line x1="310" y1="185" x2="120" y2="120"/>
  </g>

  <!-- center hub -->
  <circle cx="310" cy="185" r="62" fill="url(#hub)"/>
  <text x="310" y="180" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">WorkBuddy</text>
  <text x="310" y="204" fill="#f7e1d6" font-size="12" text-anchor="middle">数字同事</text>

  <!-- satellites -->
  <g font-size="15" font-weight="600">
    <g><rect x="258" y="50" width="104" height="40" rx="20" fill="#fff" stroke="#c96442" stroke-width="2"/><text x="310" y="75" fill="#c96442" text-anchor="middle">微信</text></g>
    <g><rect x="446" y="98" width="118" height="40" rx="20" fill="#fff" stroke="#c96442" stroke-width="2"/><text x="505" y="123" fill="#c96442" text-anchor="middle">企业微信</text></g>
    <g><rect x="416" y="265" width="104" height="40" rx="20" fill="#fff" stroke="#c96442" stroke-width="2"/><text x="468" y="290" fill="#c96442" text-anchor="middle">飞书</text></g>
    <g><rect x="98" y="265" width="104" height="40" rx="20" fill="#fff" stroke="#c96442" stroke-width="2"/><text x="150" y="290" fill="#c96442" text-anchor="middle">钉钉</text></g>
    <g><rect x="66" y="98" width="104" height="40" rx="20" fill="#fff" stroke="#c96442" stroke-width="2"/><text x="118" y="123" fill="#c96442" text-anchor="middle">QQ</text></g>
  </g>
